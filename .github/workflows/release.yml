name: Release
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      app_version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Get App Version
        id: get_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: "App v${{ steps.get_version.outputs.VERSION }}"
          body: "See the assets to download this version."
          draft: true
          make_latest: true

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: "windows-latest"
            name: "Windows"
            is-android: false
          - platform: "ubuntu-22.04"
            name: "Linux"
            is-android: false
          - platform: "ubuntu-22.04"
            name: "Android"
            is-android: true

    runs-on: ${{ matrix.settings.platform }}
    name: Build (${{ matrix.settings.name }})
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.is-android && 'aarch64-linux-android' || 'x86_64-unknown-linux-gnu' }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux build dependencies
        if: ${{ matrix.settings.platform == 'ubuntu-22.04' && !matrix.settings.is-android }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev mold clang

      - name: Setup Java (Android Only)
        if: ${{ matrix.settings.is-android }}
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Android SDK & NDK (Android Only)
        if: ${{ matrix.settings.is-android }}
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: ${{ matrix.settings.is-android }}
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and Release (Desktop)
        if: ${{ !matrix.settings.is-android }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

      - name: Build Android App (Aarch64 APK)
        if: ${{ matrix.settings.is-android }}
        run: pnpm tauri android build --apk --target aarch64 --split-per-abi

      - name: Install Build Tools for Signing
        if: ${{ matrix.settings.is-android }}
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;29.0.3"

      - name: Sign Android APK
        if: ${{ matrix.settings.is-android }}
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: src-tauri/gen/android/app/build/outputs/apk/arm64/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Android Release (Android Only)
        if: ${{ matrix.settings.is-android }}
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.create-release.outputs.app_version }}
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Checkout GitHub Pages (For F-Droid History)
        if: ${{ matrix.settings.is-android }}
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          continue-on-error: true

      - name: Build F-Droid Repository
        if: ${{ matrix.settings.is-android }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEY }}
        run: |
          sudo apt-get update
          # Forcing apksigner installation so F-Droid doesn't have an existential crisis
          sudo apt-get install -y fdroidserver apksigner
          
          # Ensure the repo directory exists in case this is the first run
          mkdir -p gh-pages/fdroid/repo
          
          # Copy the freshly minted APK into the F-Droid repo
          cp ${{ steps.sign_app.outputs.signedReleaseFile }} gh-pages/fdroid/repo/
          
          cd gh-pages/fdroid
          
          # Decode your existing Android keystore to reuse it for signing the F-Droid repo
          echo $KEYSTORE_BASE64 | base64 --decode > repo.jks
          
          # Generate F-Droid config dynamically, now with explicit SDK paths
          cat <<EOF > config.yml
          sdk_path: "$ANDROID_HOME"
          repo_url: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/fdroid/repo"
          repo_name: "${{ github.event.repository.name }} Repository"
          repo_description: "Automated F-Droid repository because Tony Stark abhors manual labor."
          repo_keyalias: "${{ secrets.ANDROID_KEY_ALIAS }}"
          keystore: "repo.jks"
          keystorepass: "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          keypass: "${{ secrets.ANDROID_KEY_PASSWORD }}"
          EOF
          
          # Build the F-Droid repository metadata explicitly
          fdroid update --create-metadata
          
          # Clean up the git directory so the deployment action doesn't trigger a recursive nightmare
          rm -rf ../.git

      - name: Deploy F-Droid Repo to GitHub Pages
        if: ${{ matrix.settings.is-android }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
