name: Release
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: 'windows-latest'
            name: 'Windows'
            is-android: false
          - platform: 'ubuntu-22.04'
            name: 'Linux'
            is-android: false
          - platform: 'ubuntu-22.04'
            name: 'Android'
            is-android: true

    runs-on: ${{ matrix.settings.platform }}
    name: Build (${{ matrix.settings.name }})
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # Matches your local setup or latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.is-android && 'aarch64-linux-android,armv7-linux-android,i686-linux-android,x86_64-linux-android' || '' }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux build dependencies
        if: matrix.settings.platform == 'ubuntu-22.04' && !matrix.settings.is-android
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev

      - name: Setup Java (Android Only)
        if: matrix.settings.is-android
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK (Android Only)
        if: matrix.settings.is-android
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and Release
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version.'
          releaseDraft: true
          prerelease: false
          # For Android, we target aarch64 by default for speed, but you can add more.
          args: ${{ matrix.settings.is-android && '--target aarch64-linux-android' || '' }}
