name: Release
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: "windows-latest"
            name: "Windows"
            is-android: false
          - platform: "ubuntu-22.04"
            name: "Linux"
            is-android: false
          - platform: "ubuntu-22.04"
            name: "Android"
            is-android: true

    runs-on: ${{ matrix.settings.platform }}
    name: Build (${{ matrix.settings.name }})
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.is-android && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || '' }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux build dependencies
        if: ${{ matrix.settings.platform == 'ubuntu-22.04' && !matrix.settings.is-android }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev mold clang

      - name: Setup Java (Android Only)
        if: ${{ matrix.settings.is-android }}
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Android SDK (Android Only)
        if: ${{ matrix.settings.is-android }}
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and Release (Desktop)
        if: ${{ !matrix.settings.is-android }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download this version."
          releaseDraft: true
          prerelease: false

      - name: Build Android App (Universal APK)
        if: ${{ matrix.settings.is-android }}
        run: pnpm tauri android build --apk

      - name: Get App Version (Android Only)
        if: ${{ matrix.settings.is-android }}
        run: echo "APP_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Upload Android Release (Android Only)
        if: ${{ matrix.settings.is-android }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          draft: true
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
